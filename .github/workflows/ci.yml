name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  typecheck-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  tauri-smoke-build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - run: npm ci
      - run: npm run build
      - run: npm run prepare:sidecar
      - run: npm run prepare:server-deps
      # Smoke build: compile only (--no-bundle). createUpdaterArtifacts requires
      # TAURI_SIGNING_PRIVATE_KEY which we don't expose on PRs; the release
      # workflow handles full bundling + signing.
      - run: npx tauri build --target aarch64-apple-darwin --no-bundle
